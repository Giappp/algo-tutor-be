# ===================================================================
# Docker Deployment Profile Configuration
# ===================================================================
# Database Settings (defaults to postgres container in docker network)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://postgres:5432/onlinejudge}
spring.datasource.username=${DATABASE_USERNAME:ojuser}
spring.datasource.password=${DATABASE_PASSWORD:ojpass}
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.jpa.show-sql=false
# Redis Settings (defaults to redis container in docker network)
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
# RabbitMQ Settings (defaults to rabbitmq container in docker network)
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:ojuser}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:ojpass}
# Piston Judge Settings (defaults to judge container in docker network)
piston.api.url=${PISTON_API_URL}
# Application general configs
spring.application.name=algo-tutor-be
server.servlet.context-path=/api/v1
spring.threads.virtual.enabled=true
# Keep logging to INFO for cleaner container stdout in production/docker
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=ERROR
# JWT & Security
jwt.secret=${JWT_SECRET}
app.security.jwt.accessTokenExpirationMs=86400000
app.security.jwt.refreshTokenExpirationMs=604800000
app.security.securedCookie=false
# AWS S3 Settings
aws.credentials.access-key=${AWS_ACCESS_KEY}
aws.credentials.secret-key=${AWS_SECRET_KEY}
aws.region=${AWS_REGION}
aws.bucket.name=${AWS_BUCKET_NAME}
# File Upload Sizes
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
# AI Settings
spring.ai.chat.client.enabled=false
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.3
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.chat.options.temperature=0.3
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.options.model=claude-sonnet-4-20250514
spring.ai.anthropic.chat.options.temperature=0.3
spring.ai.anthropic.chat.options.max-tokens=4096
ai.default-provider=GEMINI
ai.timeout-seconds=30
ai.rate-limit.max-requests=20
ai.rate-limit.window-seconds=60
# Judge Storage
app.judge.storage-path=${JUDGE_STORAGE_PATH:/algotutor/testcases}
