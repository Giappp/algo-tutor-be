spring.application.name=algo-tutor-be
server.servlet.context-path=/api/v1
spring.threads.virtual.enabled=true
jwt.secret=${JWT_SECRET}
app.security.jwt.accessTokenExpirationMs=86400000
app.security.jwt.refreshTokenExpirationMs=604800000
app.security.securedCookie=false
spring.security.filter.dispatcher-types=request
spring.jackson.deserialization.fail-on-unknown-properties=true
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.jpa.show-sql=true
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
piston.api.url=http://localhost:2000