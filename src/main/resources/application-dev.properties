spring.application.name=algo-tutor-be
server.servlet.context-path=/api/v1
spring.threads.virtual.enabled=true
jwt.secret=${JWT_SECRET}
spring.security.filter.dispatcher-types=request
spring.jackson.deserialization.fail-on-unknown-properties=true
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.jpa.show-sql=true
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
piston.api.url=${PISTON_API_URL:http://localhost:2000}
aws.credentials.access-key=${AWS_ACCESS_KEY}
aws.credentials.secret-key=${AWS_SECRET_KEY}
aws.region=${AWS_REGION}
aws.bucket.name=${AWS_BUCKET_NAME}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.security.jwt.accessTokenExpirationMs=86400000
app.security.jwt.refreshTokenExpirationMs=604800000
app.security.securedCookie=false
app.file.allowed-image-types=image/jpeg,image/png,image/webp,image/gif
spring.ai.chat.client.enabled=false
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.3
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.chat.options.include-thoughts=true
spring.ai.google.genai.chat.options.temperature=0.3
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.options.model=claude-sonnet-4-20250514
spring.ai.anthropic.chat.options.temperature=0.3
spring.ai.anthropic.chat.options.max-tokens=4096
ai.default-provider=GEMINI
ai.timeout-seconds=30
ai.rate-limit.max-requests=20
ai.rate-limit.window-seconds=60
app.judge.storage-path=${JUDGE_STORAGE_PATH:.algotutor/testcases}