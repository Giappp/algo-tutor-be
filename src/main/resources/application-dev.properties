spring.application.name=algo-tutor-be
spring.threads.virtual.enabled=true
jwt.secret=${JWT_SECRET}
jwt.accessTokenExpirationMs=${JWT_EXPIRATION_MS}
security.refreshTokenExpiration=604800
spring.security.filter.dispatcher-types=request
spring.jackson.deserialization.fail-on-unknown-properties=true
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT}
spring.rabbitmq.username=${RABBITMQ_USERNAME}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
piston.api.url=http://localhost:2000/api/v2/execute