# ===================================================================
# Spring Boot Configuration Entrypoint
# ===================================================================

# Active profile defaults to 'dev' (local development).
# Can be overridden by setting the SPRING_PROFILES_ACTIVE environment variable (e.g., to 'prod' or 'docker').
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# AI context/history controls. Characters are used as a conservative proxy for
# token budget so requests stay bounded across providers.
ai.history.max-messages=${AI_HISTORY_MAX_MESSAGES:16}
ai.history.max-characters=${AI_HISTORY_MAX_CHARACTERS:12000}
