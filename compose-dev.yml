services:
  postgres:
    image: postgres:16
    container_name: oj-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: onlinejudge
      POSTGRES_USER: ojuser
      POSTGRES_PASSWORD: ojpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ojuser -d onlinejudge" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oj-dev-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: oj-rabbitmq-dev
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ojuser
      RABBITMQ_DEFAULT_PASS: ojpass
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oj-dev-net

  redis:
    image: redis:7-alpine
    container_name: oj-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oj-dev-net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: oj-pgadmin-dev
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@oj.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - oj-dev-net
    profiles:
      - tools

  judge:
    image: ghcr.io/engineer-man/piston
    container_name: piston_api
    restart: always
    privileged: true
    ports:
      - "2000:2000"
    volumes:
      - ./data/piston/packages:/piston/packages
    tmpfs:
      - /tmp:exec
    networks:
      - oj-dev-net

networks:
  oj-dev-net:
    driver: bridge

volumes:
  postgres_dev_data:
  maven_cache: